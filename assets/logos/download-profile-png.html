<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Download UnSubD Profile PNG</title>
  <style>
    body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif; gap: 20px; }
    canvas { border-radius: 50%; }
    button { padding: 14px 28px; background: linear-gradient(135deg, #FF4500, #FF6BCB, #00C3FF); border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: 700; cursor: pointer; }
    p { color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <canvas id="c" width="400" height="400"></canvas>
  <button onclick="download()">Download PNG</button>
  <p>400×400px — ready to upload to X</p>

  <script>
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="400" height="400">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF6BCB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C3FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="iconClip">
      <rect x="8" y="8" width="104" height="104" rx="26"/>
    </clipPath>
  </defs>
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#iconGrad)" />
  <g clip-path="url(#iconClip)" filter="url(#glow)">
    <circle cx="48" cy="42" r="10" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="48" cy="78" r="10" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="55" y1="38" x2="104" y2="25" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="55" y1="82" x2="104" y2="95" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="42" y1="55" x2="42" y2="65" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  </g>
</svg>`;

    const img = new Image();
    img.onload = () => {
      const ctx = document.getElementById('c').getContext('2d');
      ctx.drawImage(img, 0, 0, 400, 400);
    };
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);

    function download() {
      const a = document.createElement('a');
      a.download = 'unsubd-profile.png';
      a.href = document.getElementById('c').toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
