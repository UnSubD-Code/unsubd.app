<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Download X Banner PNG</title>
  <style>
    body { background: #111; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 20px; font-family: sans-serif; }
    canvas { max-width: 100%; border: 1px solid #1a1a1a; }
    button { padding: 14px 28px; background: linear-gradient(135deg, #FF4500, #FF6BCB, #00C3FF); border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: 700; cursor: pointer; }
    p { color: #555; font-size: 13px; margin: 0; }
  </style>
</head>
<body>
  <canvas id="c" width="1500" height="500"></canvas>
  <button onclick="download()">Download Banner PNG</button>
  <p>1500×500px — ready to upload to X</p>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="140" height="140">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF6BCB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C3FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="iconClip">
      <rect x="8" y="8" width="104" height="104" rx="26"/>
    </clipPath>
  </defs>
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#iconGrad)" />
  <g clip-path="url(#iconClip)" filter="url(#glow)">
    <circle cx="48" cy="42" r="10" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="48" cy="78" r="10" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="55" y1="38" x2="104" y2="25" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="55" y1="82" x2="104" y2="95" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="42" y1="55" x2="42" y2="65" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  </g>
</svg>`;

    const img = new Image();
    img.onload = () => draw(img);
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(iconSvg);

    function draw(iconImg) {
      const W = 1500, H = 500;

      // Background
      ctx.fillStyle = '#0f0f0f';
      ctx.fillRect(0, 0, W, H);

      // Subtle gradient glow top-left
      const glow = ctx.createRadialGradient(200, 250, 0, 200, 250, 500);
      glow.addColorStop(0, 'rgba(255,69,0,0.06)');
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, H);

      // Bottom gradient bar
      const bar = ctx.createLinearGradient(0, 0, W, 0);
      bar.addColorStop(0, '#FF4500');
      bar.addColorStop(0.5, '#FF6BCB');
      bar.addColorStop(1, '#00C3FF');
      ctx.fillStyle = bar;
      ctx.fillRect(0, H - 5, W, 5);

      // Icon — centered vertically, left-padded
      const iconSize = 140;
      const iconX = 380;
      const iconY = (H - iconSize) / 2;
      ctx.drawImage(iconImg, iconX, iconY, iconSize, iconSize);

      // "UnSubD" wordmark
      const nameFont = "bold 88px 'Trebuchet MS', sans-serif";
      ctx.font = nameFont;
      const textX = iconX + iconSize + 28;
      const nameY = H / 2 + 22;

      // "Un" in white
      ctx.fillStyle = '#ffffff';
      ctx.fillText('Un', textX, nameY);
      const unWidth = ctx.measureText('Un').width;

      // "SubD" in gradient
      const subdX = textX + unWidth;
      const subdWidth = ctx.measureText('SubD').width;
      const nameGrad = ctx.createLinearGradient(subdX, 0, subdX + subdWidth, 0);
      nameGrad.addColorStop(0, '#FF4500');
      nameGrad.addColorStop(0.5, '#FF6BCB');
      nameGrad.addColorStop(1, '#00C3FF');
      ctx.fillStyle = nameGrad;
      ctx.fillText('SubD', subdX, nameY);

      // Tagline
      ctx.font = "600 15px 'Trebuchet MS', sans-serif";
      ctx.letterSpacing = '3px';
      ctx.fillStyle = '#4a4a4a';
      ctx.fillText('FREE SOFTWARE. NO STRINGS.', textX + 3, nameY + 36);
      ctx.letterSpacing = '0px';

      // Value prop
      ctx.font = "26px 'Trebuchet MS', sans-serif";
      ctx.fillStyle = '#666666';
      ctx.fillText('One-click Windows installers for open source software.', textX, nameY + 100);

      // URL — bottom right
      ctx.font = "18px 'Trebuchet MS', sans-serif";
      ctx.fillStyle = '#2a2a2a';
      ctx.textAlign = 'right';
      ctx.fillText('unsubd.app', W - 60, H - 24);
    }

    function download() {
      const a = document.createElement('a');
      a.download = 'unsubd-banner.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
