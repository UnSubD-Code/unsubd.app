<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Generate OG Image</title>
  <style>
    body { background: #111; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 20px; font-family: sans-serif; }
    canvas { max-width: 100%; border: 1px solid #1a1a1a; }
    button { padding: 14px 28px; background: linear-gradient(135deg, #FF4500, #FF6BCB, #00C3FF); border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: 700; cursor: pointer; }
    p { color: #555; font-size: 13px; margin: 0; }
  </style>
</head>
<body>
  <canvas id="c" width="1200" height="630"></canvas>
  <button onclick="download()">Download og-image.png</button>
  <p>Save as og-image.png in the root of the repo, then commit and push.</p>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 1200, H = 630;

    const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500"/>
      <stop offset="50%" style="stop-color:#FF6BCB"/>
      <stop offset="100%" style="stop-color:#00C3FF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="c2"><rect x="8" y="8" width="104" height="104" rx="26"/></clipPath>
  </defs>
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#g)"/>
  <g clip-path="url(#c2)" filter="url(#glow)">
    <circle cx="48" cy="42" r="10" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="48" cy="78" r="10" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="55" y1="38" x2="104" y2="25" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="55" y1="82" x2="104" y2="95" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="42" y1="55" x2="42" y2="65" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  </g>
</svg>`;

    const img = new Image();
    img.onload = () => draw(img);
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(iconSvg);

    function draw(icon) {
      // Background
      ctx.fillStyle = '#0f0f0f';
      ctx.fillRect(0, 0, W, H);

      // Subtle left glow
      const glow = ctx.createRadialGradient(180, H/2, 0, 180, H/2, 400);
      glow.addColorStop(0, 'rgba(255,69,0,0.07)');
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, H);

      // Bottom gradient bar
      const bar = ctx.createLinearGradient(0, 0, W, 0);
      bar.addColorStop(0, '#FF4500');
      bar.addColorStop(0.5, '#FF6BCB');
      bar.addColorStop(1, '#00C3FF');
      ctx.fillStyle = bar;
      ctx.fillRect(0, H - 5, W, 5);

      // Icon
      ctx.drawImage(icon, 80, H/2 - 60, 120, 120);

      // "Un" in white
      ctx.font = "bold 96px 'Trebuchet MS', sans-serif";
      const textX = 228;
      const nameY = H/2 + 18;
      ctx.fillStyle = '#ffffff';
      ctx.fillText('Un', textX, nameY);
      const unW = ctx.measureText('Un').width;

      // "SubD" in gradient
      const subdX = textX + unW;
      const subdW = ctx.measureText('SubD').width;
      const nameGrad = ctx.createLinearGradient(subdX, 0, subdX + subdW, 0);
      nameGrad.addColorStop(0, '#FF4500');
      nameGrad.addColorStop(0.5, '#FF6BCB');
      nameGrad.addColorStop(1, '#00C3FF');
      ctx.fillStyle = nameGrad;
      ctx.fillText('SubD', subdX, nameY);

      // Tagline
      ctx.letterSpacing = '3px';
      ctx.font = "600 14px 'Trebuchet MS', sans-serif";
      ctx.fillStyle = '#444444';
      ctx.fillText('FREE SOFTWARE. NO STRINGS.', textX + 3, nameY + 36);
      ctx.letterSpacing = '0px';

      // Headline
      ctx.font = "32px 'Trebuchet MS', sans-serif";
      ctx.fillStyle = '#888888';
      const line1 = "The apps you're paying for every month";
      const line2 = 'already exist for free.';
      ctx.fillText(line1, textX, nameY + 100);
      ctx.fillStyle = '#aaaaaa';
      ctx.font = "bold 32px 'Trebuchet MS', sans-serif";
      ctx.fillText(line2, textX, nameY + 142);

      // URL bottom right
      ctx.font = "16px 'Trebuchet MS', sans-serif";
      ctx.fillStyle = '#2a2a2a';
      ctx.textAlign = 'right';
      ctx.fillText('unsubd.app', W - 60, H - 22);
    }

    function download() {
      const a = document.createElement('a');
      a.download = 'og-image.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
