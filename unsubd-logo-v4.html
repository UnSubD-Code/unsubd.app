<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f0f;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .logo-wrap {
    padding: 40px;
  }
</style>
</head>
<body>
<div class="logo-wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 165" width="380" height="150">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF6BCB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C3FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF6BCB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C3FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="iconClip">
      <rect x="8" y="8" width="104" height="104" rx="26"/>
    </clipPath>
  </defs>

  <!-- Icon -->
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#iconGrad)" />
  <g clip-path="url(#iconClip)" filter="url(#glow)">
    <circle cx="48" cy="42" r="10" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="48" cy="78" r="10" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="55" y1="38" x2="104" y2="25" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="55" y1="82" x2="104" y2="95" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="42" y1="55" x2="42" y2="65" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  </g>

  <!-- "Un" in pure white -->
  <text x="130" y="105"
    font-family="'Trebuchet MS', 'Gill Sans', sans-serif"
    font-size="72" font-weight="700" letter-spacing="-2"
    fill="#ffffff"
    filter="url(#textGlow)">Un</text>

  <!-- "SubD" in vivid gradient -->
  <text x="216" y="105"
    font-family="'Trebuchet MS', 'Gill Sans', sans-serif"
    font-size="72" font-weight="700" letter-spacing="-2"
    fill="url(#mainGrad)"
    filter="url(#textGlow)">SubD</text>

  <!-- Tagline — smaller font and tighter spacing to fit -->
  <text x="131" y="132"
    font-family="'Trebuchet MS', 'Gill Sans', sans-serif"
    font-size="13" font-weight="400" letter-spacing="2.5"
    fill="#666666">FREE SOFTWARE. NO STRINGS.</text>
</svg>
</div>
</body>
</html>
